name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from the packageManager field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      # Typecheck after build: the app resolves the editor's dist types.
      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      # Playwright E2E is intentionally excluded from CI in round 1 - run
      # locally via `pnpm test:e2e`.
